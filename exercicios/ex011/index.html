<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vário dispositivos diferentes ou simplesmente aumente ou diminua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    
    </picture>
    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir audios em html</p>
    <audio preload="metadata" autoplay controls>
        <source src="áudios/Devclub.m4a" type="audio/mp4">
        <source src="áudios/Devclub.ogg" type="audio/ogg">
        <source src="áudios/Devclub.wav" type="audio/wav">
        <p>infelizmente seu navegador não consegue reproduzir áudio <a href="áudios/Devclub.m4a">clique aqui para baixar um arquivo</a></p>
    </audio>
    <!--MP3 WAV OGG: Formatos de áudio-->
</body>
</html>
